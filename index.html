<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Li — Writing</title>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #1a1a1a;
    --muted: #737373;
    --border: #e5e5e5;
    --accent2: #2563eb;
  }

  [data-theme="dark"] {
    --bg: #141414;
    --fg: #e5e5e5;
    --muted: #888;
    --border: #2a2a2a;
    --accent2: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    font-size: 16px;
    transition: background 0.2s, color 0.2s;
  }

  .site-header {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }

  .site-header a { color: var(--fg); text-decoration: none; }
  .site-header a:hover { text-decoration: underline; }
  .site-name { font-weight: 600; }
  .site-nav { display: flex; gap: 16px; align-items: center; }
  .site-nav a { color: var(--muted); }

  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 4px;
    line-height: 1;
  }

  .theme-toggle:hover { color: var(--fg); }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px 120px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 48px;
    letter-spacing: -0.5px;
  }

  .post {
    margin-bottom: 32px;
  }

  .post a {
    color: var(--fg);
    text-decoration: none;
    font-weight: 600;
    font-size: 18px;
  }

  .post a:hover { color: var(--accent2); }

  .post-meta {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header class="site-header">
  <a href="/writing/index.html" class="site-name">Kevin Li</a>
  <nav class="site-nav">
    <a href="/writing/index.html">Writing</a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◑</button>
  </nav>
</header>

<main>
  <h1>Writing</h1>

  <div class="post">
    <a href="/writing/claude-cant-flip-a-coin/">Claude Can't Flip a Coin</a>
    <div class="post-meta">Mar 6, 2026 · 4 min read</div>
  </div>
</main>

<script>
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<script data-goatcounter="https://polarizing96.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
